name: CI/CD Pipeline

# ─── WHEN THIS RUNS ──────────────────────────────────────────────────────────
# Every push and pull request targeting main triggers the test job.
# Only a direct push to main (i.e. a merged PR) also triggers build-push.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # JOB 1 — UNIT TESTS
  # Runs on every push and every PR. Must pass before build-push starts.
  # No DB, no Kafka, no ML models needed — all external deps are mocked.
  test:
    name: Unit Tests
    runs-on: ubuntu-latest   # GitHub-hosted Linux runner (free for public repos)

    steps:
      # 1. Check out the repository code onto the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Python 3.11 and enable pip caching
      #    cache-dependency-path: when requirements-prod.txt changes, cache is invalidated
      #    This saves ~2 min on repeat runs by skipping re-downloads
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-prod.txt

      # 3. Install production deps + test tools
      #    We use requirements-prod.txt (NOT requirements.txt) to skip torch/transformers
      #    — that's 2.5 GB we don't need. Unit tests mock the ML models entirely.
      - name: Install dependencies
        run: |
          pip install -r requirements-prod.txt
          pip install pytest pytest-asyncio pytest-cov

      # 4. Run unit tests with coverage report printed to console
      #    --tb=short: concise traceback on failure (easier to read in CI logs)
      #    --cov=src: measure which lines in src/ are exercised by tests
      - name: Run unit tests
        run: pytest tests/unit -v --tb=short --cov=src --cov-report=term-missing

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2 — BUILD & PUSH TO ACR
  # Only runs on direct pushes to main (not PRs) AND only if tests passed.
  # Downloads ML models from ADLS, builds the Docker image, pushes to ACR.
  # ═══════════════════════════════════════════════════════════════════════════
  build-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    needs: test   # blocks until test job is green — never push a broken image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Download the 3 inference model files from ADLS into the expected paths.
      # The Dockerfile COPYs from src/ml/models/ — so the files must exist here
      # before docker build runs. Models are stored in ADLS because they're
      # large binaries (170MB ONNX) — unsuitable for git.
      - name: Download ML models from ADLS
        env:
          AZURE_STORAGE_ACCOUNT: financetrackerdl
          AZURE_STORAGE_KEY: ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}
        run: |
          mkdir -p src/ml/models
          az storage blob download --container-name models --name tfidf_vectorizer.joblib --file src/ml/models/tfidf_vectorizer.joblib
          az storage blob download --container-name models --name tfidf_classifier.joblib  --file src/ml/models/tfidf_classifier.joblib
          az storage blob download --container-name models --name categorizer_int8.onnx    --file src/ml/models/categorizer_int8.onnx

      # Authenticate Docker to your private ACR using admin credentials.
      # Secrets are set in GitHub → Settings → Secrets and variables → Actions.
      # They are never exposed in logs — GitHub masks them automatically.
      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: financetracker.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # Build the image and push two tags simultaneously:
      #   :latest       — always points to the most recent main build
      #   :<git-sha>    — immutable, ties the image back to the exact commit
      #                   (useful for rollbacks: deploy v1 by SHA, not "latest")
      #
      # cache-from: pull the previous :latest image and reuse its unchanged layers
      #             (pip install layer is reused if requirements-prod.txt didn't change)
      # cache-to: store the new cache metadata inline inside the pushed image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            financetracker.azurecr.io/finance-api:latest
            financetracker.azurecr.io/finance-api:${{ github.sha }}
          cache-from: type=registry,ref=financetracker.azurecr.io/finance-api:latest
          cache-to: type=inline
